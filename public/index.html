<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directa — صانع الفيديو بالذكاء الاصطناعي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <meta name="theme-color" content="#080808">
</head>
<body>

  <!-- Landing Page -->
  <div id="landing-page" class="landing">
    <div class="landing-content">
      <div class="landing-logo">Directa</div>
      <div class="landing-tagline">حوّل رؤيتك إلى فيديو سينمائي</div>
      <div class="landing-sub">اختر، وصف، وخلّ الذكاء الاصطناعي يخرج لك المشهد</div>
      <button class="landing-btn" id="btn-start">ابدأ الآن</button>
      <div class="landing-history" id="landing-history">📋 مشاريعي السابقة</div>
      <div id="landing-templates"></div>
    </div>
    <div class="landing-footer">Powered by fal.ai</div>
  </div>

  <!-- Wizard -->
  <div id="wizard-view" class="hidden">
    <div id="progress-bar" style="width: 0%"></div>

    <div class="header">
      <span class="logo">Directa</span>
      <a href="#" class="history-link" id="history-link">📋 مشاريعي</a>
    </div>

    <div class="step-counter" id="step-counter"></div>

    <div class="wizard-container">
      <div id="wizard-content"></div>

      <div class="nav-buttons" id="nav-buttons">
        <button class="nav-btn back hidden" id="btn-back">رجوع</button>
        <button class="nav-btn next" id="btn-next" disabled>التالي</button>
      </div>
    </div>
  </div>

  <div class="wizard-container">
    <div class="history-panel" id="history-panel"></div>
  </div>

  <script src="/wizard.js"></script>
</body>
</html>
